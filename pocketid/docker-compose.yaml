services:
  pocketid:
    image: ghcr.io/pocket-id/pocket-id
    container_name: pocketid
    hostname: id.greyroom.net
    environment:
      - PUBLIC_APP_URL=https://id.greyroom.net
      - APP_URL=https://id.greyroom.net
      - TRUST_PROXY=true
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - RELYING_PARTY_ID=greyroom.net
      - RELYING_PARTY_ORIGIN=https://id.greyroom.net
    env_file:
      - .env
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.pocketid-secure.entrypoints=https"
      - "traefik.http.routers.pocketid-secure.rule=Host(`id.greyroom.net`)"
      - "traefik.http.routers.pocketid-secure.tls=true"
      - "traefik.http.routers.pocketid-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.pocketid-secure.service=pocketid"
      - "traefik.http.routers.pocketid-secure.middlewares=pocketid-headers@file"
      - "traefik.http.services.pocketid.loadbalancer.server.port=1411"
    volumes:
      - ${HOME_DIR}/pocketid/data:/app/data
    healthcheck:
      test: "curl -f http://localhost:1411/health"
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
    restart: unless-stopped

  webfinger:
    image: nginx
    container_name: webfinger
    volumes:
      - ${HOME_DIR}/pocketid/webfinger-data:/usr/share/nginx/html:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.webfinger-secure.entrypoints=https"
      - "traefik.http.routers.webfinger-secure.rule=Host(`greyroom.net`)"
      - "traefik.http.routers.webfinger-secure.tls=true"
      - "traefik.http.routers.webfinger-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.webfinger-secure.service=webfinger"
      - "traefik.http.routers.webfinger-secure.middlewares=pocketid-headers@file"
      - "traefik.http.services.webfinger.loadbalancer.server.port=80"
    restart: unless-stopped

networks:
  proxy:
    external: true
